services:
  nassync:
    build: .
    container_name: nassync
    restart: unless-stopped
    ports:
      - "3500:3500"
    volumes:
      - nassync_data:/data
      - /path/to/nas/folder:/nas/folder:ro
      - /path/to/external/hdd:/hdd
    environment:
      - PORT=3000
      - TZ=Europe/Bucharest

volumes:
  nassync_data:
